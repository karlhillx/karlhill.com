server {
    listen 80;
    server_name karlhill.com www.karlhill.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://karlhill.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.karlhill.com;

    ssl_certificate /etc/letsencrypt/live/karlhill.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/karlhill.com/privkey.pem;

    return 301 https://karlhill.com$request_uri;
}

server {
    listen 443 ssl;
    server_name karlhill.com;

    ssl_certificate /etc/letsencrypt/live/karlhill.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/karlhill.com/privkey.pem;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /img/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
