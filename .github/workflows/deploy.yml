name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

env:
  CONTAINER_APP_PATH: /var/www/html

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check deploy secrets
        id: config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_CONTAINER: ${{ secrets.DEPLOY_CONTAINER }}
        run: |
          missing=()
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_KEY" ] && missing+=("DEPLOY_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::error title=Deploy secrets missing::Add environment secrets: ${missing[*]}"
            echo "Go to: Settings → Environments → production → Environment secrets"
            echo "Required: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY"
            echo "Optional: DEPLOY_CONTAINER (default karl-karlhill-1)"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "container=${DEPLOY_CONTAINER:-karl-karlhill-1}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        if: steps.config.outputs.ready == 'true'

      - name: Deploy to production
        if: steps.config.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_CONTAINER: ${{ steps.config.outputs.container }}
          APP_PATH: ${{ env.CONTAINER_APP_PATH }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          tar czf - \
            --exclude='./.git' \
            --exclude='./vendor' \
            --exclude='./node_modules' \
            --exclude='./.env' \
            --exclude='./storage' \
            . | $SSH "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker exec -i ${DEPLOY_CONTAINER} tar xzf - -C ${APP_PATH}"

          $SSH "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker exec ${DEPLOY_CONTAINER} bash -lc 'cd ${APP_PATH} && bash scripts/deploy-remote.sh'"

          $SSH "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "docker exec karl-nginx-1 nginx -s reload 2>/dev/null || true"

      - name: Fail when deploy secrets are missing
        if: steps.config.outputs.missing != ''
        run: |
          echo "Missing secrets: ${{ steps.config.outputs.missing }}"
          exit 1
