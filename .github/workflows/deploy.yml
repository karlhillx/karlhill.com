name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check deploy secrets
        id: config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_PATH" ] && missing+=("DEPLOY_PATH")
          [ -z "$DEPLOY_KEY" ] && missing+=("DEPLOY_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy skipped::Set GitHub environment secrets: ${missing[*]}"
            echo "Add secrets at: Settings → Environments → production → Environment secrets"
            echo "Required: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PATH, DEPLOY_SSH_KEY (private key)"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to production
        if: steps.config.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_PATH} && bash scripts/deploy.sh"

      - name: Fail manual deploy when secrets are missing
        if: github.event_name == 'workflow_dispatch' && steps.config.outputs.missing != ''
        run: |
          echo "Missing secrets: ${{ steps.config.outputs.missing }}"
          echo "Add them under Settings → Environments → production → Environment secrets"
          exit 1
